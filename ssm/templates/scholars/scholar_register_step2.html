{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scholar Registration - Dept of IT</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="{% static 'imgs/annamalai.png' %}" />
  <link rel="stylesheet" href="{% static 'css/student_style.css' %}">
  <style>
    .form-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .form-title { text-align: center; font-size: 24px; color: #333; margin-bottom: 25px; font-weight: 600; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; font-size: 14px;}
    .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: #28a745; box-shadow: 0 0 5px rgba(40,167,69,0.2); }
    .btn-submit { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s; margin-top: 10px;}
    .btn-submit:hover { background: #218838; }
    .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #28a745; padding-bottom: 5px; color:#333; margin-top: 30px;}

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    
    @media (max-width: 768px) {
        .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body style="background-color: #f4f6f9;">

  <header class="site-header">
    <div class="header-content">
      <img src="https://res.cloudinary.com/deocom5lr/image/upload/v1754117176/annamalai_kuoh1j.png"
        alt="University Logo" class="header-logo">
      <div class="header-titles">
        <span class="university-name">Annamalai University</span>
        <span class="department-name">Department of Information Technology</span>
      </div>
    </div>
  </header>

  <div class="form-container">
    <h2 class="form-title">Registration - Part 2 ({{ student.student_name }})</h2>
    
    <form action="{% url 'scholar_register_step2' %}" method="post">
      {% csrf_token %}
      
      <div class="section-title" style="margin-top:0;">Personal Information</div>
      <div class="grid-3">
        <div class="form-group">
            <label>Gender</label>
            <select name="gender" class="form-input" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" class="form-input" required>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" name="student_mobile" class="form-input" required>
        </div>
      </div>
      <div class="form-group">
        <label>Permanent Address</label>
        <textarea name="permanent_address" class="form-input" rows="3" required></textarea>
      </div>

      <div class="section-title">UG Details</div>
      <div class="grid-3">
          <div class="form-group">
            <label>UG Degree & Course</label>
            <input type="text" name="ug_course" class="form-input" placeholder="e.g. B.E. Computer Science" required>
          </div>
          <div class="form-group">
            <label>UG University</label>
            <input type="text" name="ug_university" class="form-input" required>
          </div>
          <div class="form-group">
            <label>Year of Passing</label>
            <input type="text" name="ug_year_of_passing" class="form-input" required>
          </div>
      </div>

      <div class="section-title">PG Details</div>
      <div class="grid-3">
          <div class="form-group">
            <label>PG Degree & Course</label>
            <input type="text" name="pg_course" class="form-input" placeholder="e.g. M.E. Information Tech" required>
          </div>
          <div class="form-group">
            <label>PG University</label>
            <input type="text" name="pg_university" class="form-input" required>
          </div>
          <div class="form-group">
            <label>Year of Passing</label>
            <input type="text" name="pg_year_of_passing" class="form-input" required>
          </div>
      </div>

      <button type="submit" class="btn-submit">Complete Registration</button>
    </form>
  </div>

</body>
</html>
