{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scholar Registration - Dept of IT</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="{% static 'imgs/annamalai.png' %}" />
  <link rel="stylesheet" href="{% static 'css/student_style.css' %}">
  <style>
    .form-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .form-title { text-align: center; font-size: 24px; color: #333; margin-bottom: 25px; font-weight: 600; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; font-size: 14px;}
    .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: #28a745; box-shadow: 0 0 5px rgba(40,167,69,0.2); }
    .btn-submit { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s; margin-top: 10px;}
    .btn-submit:hover { background: #218838; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    
    @media (max-width: 768px) {
        .grid-2 { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body style="background-color: #f4f6f9;">

  <header class="site-header">
    <div class="header-content">
      <img src="https://res.cloudinary.com/deocom5lr/image/upload/v1754117176/annamalai_kuoh1j.png"
        alt="University Logo" class="header-logo">
      <div class="header-titles">
        <span class="university-name">Annamalai University</span>
        <span class="department-name">Department of Information Technology</span>
      </div>
    </div>
  </header>

  <div class="form-container">
    <h2 class="form-title">Research Scholar Registration - Part 1</h2>
    
    {% if messages %}
        {% for message in messages %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 20px;">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form action="{% url 'scholar_register_step1' %}" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      
      <div class="grid-2">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="student_name" class="form-input" required>
          </div>
          
          <div class="form-group">
            <label>Admission Number</label>
            <input type="text" name="admission_no" class="form-input" required>
          </div>
      </div>

      <div class="grid-2">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="student_email" class="form-input" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-input" required>
          </div>
      </div>

      <div class="grid-2">
          <div class="form-group">
            <label>Scholar Type</label>
            <select name="scholar_type" class="form-input" required>
                <option value="Full Time">Full Time</option>
                <option value="Part Time Internal">Part Time - Internal</option>
                <option value="Part Time External">Part Time - External</option>
            </select>
          </div>

          <div class="form-group">
            <label>Admission Date</label>
            <input type="date" name="admission_date" class="form-input" required>
          </div>
      </div>

      <div class="grid-2">
          <div class="form-group">
            <label>Allocated Research Supervisor</label>
            <select name="supervisor_id" class="form-input" required>
                <option value="">-- Select Supervisor --</option>
                {% for s in staff_list %}
                <option value="{{ s.staff_id }}">{{ s.name }} ({{ s.designation }})</option>
                {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label>Admission Order Document (PDF/Image)</label>
            <input type="file" name="admission_order_doc" class="form-input" required>
          </div>
      </div>

      <button type="submit" class="btn-submit">Proceed to Step 2 →</button>
    </form>
    
    <div style="text-align:center; margin-top:20px;">
        <a href="{% url 'scholar_login' %}" style="color: #28a745; text-decoration: none; font-weight: 500;">Already registered? Login Here</a>
    </div>
  </div>

</body>
</html>
