{% extends "base2.html" %}

{% block title %}Page Not Found - Dept of IT{% endblock %}

{% block content %}
<div class="login-main-content">
  <div class="page-container" style="flex-direction: column; justify-content: center; align-items: center; text-align: center; max-width: 700px; min-height: 400px; padding: 40px; margin: 40px auto;">
    <div style="font-size: 6rem; margin-bottom: 20px; color: var(--accent-color); font-weight: bold; line-height: 1;">404</div>
    <h1 style="font-size: 1.8em; color: var(--text-primary); margin-top: 0; margin-bottom: 15px;">Page Not Found</h1>
    <p style="color: var(--text-secondary); font-size: 1.1em; margin-bottom: 30px; line-height: 1.6; max-width: 500px;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="/" class="btn-login" style="width: auto; padding: 12px 30px; text-decoration: none; display: inline-block;">← Return to Home</a>
  </div>
</div>
{% endblock %}
